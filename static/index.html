<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Local RAG</title>
<style>
  :root { --bg:#0f1117; --panel:#171923; --border:#2a2d3a; --accent:#6366f1; --text:#e5e7eb; --muted:#9ca3af; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex; flex-direction: column;
  }
  header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    font-size: 15px; font-weight: 600; flex-shrink: 0;
  }

  /* Scrollable message history */
  #chat {
    flex: 1; overflow-y: auto; padding: 20px; display: flex;
    flex-direction: column; gap: 16px; max-width: 800px; width: 100%;
    margin: 0 auto;
  }
  .msg { max-width: 85%; padding: 12px 16px; border-radius: 14px; line-height: 1.5; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.bot.loading { color: var(--muted); font-style: italic; }
  .meta { margin-top: 8px; font-size: 12px; color: var(--muted); }
  .meta a { color: #93c5fd; }
  .file-tag-inline { font-size: 12px; opacity: 0.85; margin-top: 6px; }

  /* Fixed input bar at the bottom */
  #input-bar { border-top: 1px solid var(--border); padding: 14px 20px; flex-shrink: 0; }
  .input-box {
    max-width: 800px; margin: 0 auto; background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 10px 10px 14px; display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.15s, background 0.15s;
  }
  .input-box.drag-over { border-color: var(--accent); background: #1c1f2e; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: flex; align-items: center; gap: 6px; background: #232636;
    border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; font-size: 13px;
  }
  .chip button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; line-height: 1; }
  textarea {
    width: 100%; min-height: 24px; max-height: 160px; resize: none; background: transparent; border: none;
    outline: none; color: var(--text); font-size: 15px; font-family: inherit;
  }
  .toolbar { display: flex; justify-content: space-between; align-items: center; }
  .toolbar .left { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    background: #232636; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 13px;
  }
  .icon-btn.active { color: var(--text); border-color: var(--accent); }
  .send-btn {
    background: var(--accent); border: none; color: white; border-radius: 8px;
    padding: 8px 18px; cursor: pointer; font-size: 14px; font-weight: 600;
  }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .scope-group { display: flex; gap: 4px; }
</style>
</head>
<body>
  <header>Local RAG — web search + your files</header>

  <div id="chat"></div>

  <div id="input-bar">
    <div class="input-box" id="inputBox">
      <div class="chips" id="chips"></div>
      <textarea id="query" placeholder="Ask anything... (drag & drop or paste files here too)" rows="1"></textarea>
      <div class="toolbar">
        <div class="left">
          <button class="icon-btn" onclick="document.getElementById('fileInput').click()">+ Attach</button>
          <input type="file" id="fileInput" multiple accept=".pdf,.docx,.txt,.md" style="display:none">
          <div class="scope-group" id="scopeGroup">
            <button class="icon-btn active" data-scope="auto" onclick="setScope('auto')">Auto</button>
            <button class="icon-btn" data-scope="web" onclick="setScope('web')">Web</button>
            <button class="icon-btn" data-scope="files" onclick="setScope('files')">Files</button>
            <button class="icon-btn" data-scope="both" onclick="setScope('both')">Both</button>
          </div>
        </div>
        <button class="send-btn" id="sendBtn" onclick="ask()">Send</button>
      </div>
    </div>
  </div>

<script>
let attachedFiles = [];
let scope = 'auto'; // auto: files-only if attached, else web

document.getElementById('fileInput').addEventListener('change', (e) => {
  addFiles(e.target.files);
  e.target.value = ''; // allow re-selecting the same file later
});

function addFiles(fileList) {
  const allowed = ['.pdf', '.docx', '.txt', '.md'];
  Array.from(fileList).forEach(f => {
    const ext = '.' + f.name.split('.').pop().toLowerCase();
    if (allowed.includes(ext)) {
      attachedFiles.push(f);
    } else {
      addMessage('bot', `Skipped "${f.name}" — unsupported type. Allowed: ${allowed.join(', ')}`);
    }
  });
  renderChips();
}

// Drag and drop onto the input box
const inputBox = document.getElementById('inputBox');
['dragenter', 'dragover'].forEach(evt => {
  inputBox.addEventListener(evt, (e) => {
    e.preventDefault();
    inputBox.classList.add('drag-over');
  });
});
['dragleave', 'drop'].forEach(evt => {
  inputBox.addEventListener(evt, (e) => {
    e.preventDefault();
    inputBox.classList.remove('drag-over');
  });
});
inputBox.addEventListener('drop', (e) => {
  if (e.dataTransfer.files && e.dataTransfer.files.length) {
    addFiles(e.dataTransfer.files);
  }
});

// Paste files (e.g. screenshots, or files copied from a file manager) directly into the textarea
document.getElementById('query').addEventListener('paste', (e) => {
  const items = e.clipboardData && e.clipboardData.files;
  if (items && items.length) {
    e.preventDefault();
    addFiles(items);
  }
  // otherwise let normal text paste happen
});

document.getElementById('query').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    ask();
  }
});
document.getElementById('query').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

function setScope(s) {
  scope = s;
  document.querySelectorAll('#scopeGroup button').forEach(b => {
    b.classList.toggle('active', b.dataset.scope === s);
  });
}

function renderChips() {
  const chips = document.getElementById('chips');
  chips.innerHTML = '';
  attachedFiles.forEach((f, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `📄 ${f.name} <button onclick="removeFile(${i})">×</button>`;
    chips.appendChild(chip);
  });
}

function removeFile(i) {
  attachedFiles.splice(i, 1);
  renderChips();
}

function addMessage(role, text, className = '') {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role} ${className}`.trim();
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function ask() {
  const input = document.getElementById('query');
  const query = input.value.trim();
  if (!query) return;

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  const fileNames = attachedFiles.map(f => f.name);
  addMessage('user', query + (fileNames.length ? `\n📎 ${fileNames.join(', ')}` : ''));
  input.value = '';
  input.style.height = 'auto';

  const loadingMsg = addMessage('bot', 'Thinking...', 'loading');

  const formData = new FormData();
  formData.append('query', query);
  formData.append('scope', scope);
  attachedFiles.forEach(f => formData.append('files', f));

  try {
    const res = await fetch('/api/ask', { method: 'POST', body: formData });
    const raw = await res.text();
    let data;
    try {
      data = JSON.parse(raw);
    } catch {
      throw new Error(`Server returned a non-JSON response (status ${res.status}).`);
    }
    if (!res.ok) throw new Error(data.error || `Request failed (status ${res.status})`);

    loadingMsg.classList.remove('loading');
    loadingMsg.textContent = data.answer;

    if ((data.sources && data.sources.length) || (data.files && data.files.length)) {
      const meta = document.createElement('div');
      meta.className = 'meta';
      let html = '';
      if (data.sources && data.sources.length) {
        html += data.sources.map(u => `<a href="${u}" target="_blank">${u}</a>`).join('<br>');
      }
      if (data.files && data.files.length) {
        html += (html ? '<br>' : '') + '📄 ' + data.files.join(', ');
      }
      meta.innerHTML = html;
      loadingMsg.appendChild(meta);
    }
  } catch (err) {
    loadingMsg.classList.remove('loading');
    loadingMsg.textContent = 'Error: ' + err.message;
  } finally {
    sendBtn.disabled = false;
    attachedFiles = [];
    renderChips();
    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
  }
}
</script>
</body>
</html>
